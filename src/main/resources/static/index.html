<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ChatterBox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* JOIN PAGE */
        #join-page {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 350px;
        }

        #join-page h2 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        #join-page p {
            color: #aaa;
            margin-bottom: 24px;
        }

        #nameInput {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid #0f3460;
            background: #0f3460;
            color: white;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
        }

        #nameInput:focus { border-color: #e94560; }

        #joinBtn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        #joinBtn:hover { background: #c73652; }

        /* CHAT PAGE */
        #chat-page {
            display: none;
            width: 420px;
            height: 600px;
            background: #16213e;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            flex-direction: column;
            overflow: hidden;
        }

        #chat-header {
            background: #e94560;
            padding: 16px 20px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #messages {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #messages li {
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 80%;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .chat-msg {
            background: #0f3460;
            color: white;
            align-self: flex-start;
        }

        .my-msg {
            background: #e94560 !important;
            color: white !important;
            align-self: flex-end !important;
        }

        .join-msg {
            color: #4caf50 !important;
            font-style: italic;
            background: transparent !important;
            align-self: center !important;
            font-size: 0.8rem !important;
        }

        .leave-msg {
            color: #f44336 !important;
            font-style: italic;
            background: transparent !important;
            align-self: center !important;
            font-size: 0.8rem !important;
        }

        .divider {
            color: #555 !important;
            font-style: italic;
            background: transparent !important;
            align-self: center !important;
            font-size: 0.75rem !important;
        }

        #chat-input {
            display: flex;
            padding: 12px;
            gap: 8px;
            background: #0f3460;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #16213e;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        #sendBtn {
            padding: 10px 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        #sendBtn:hover { background: #c73652; }
    </style>
</head>
<body>

<!-- JOIN PAGE -->
<div id="join-page">
    <h2>ChatterBox 💬</h2>
    <p>Enter your name to start chatting</p>
    <input id="nameInput" placeholder="Your name..." />
    <button id="joinBtn" onclick="joinChat()">Join Chat →</button>
</div>

<!-- CHAT PAGE -->
<div id="chat-page">
    <div id="chat-header">💬 ChatterBox</div>
    <ul id="messages"></ul>
    <div id="chat-input">
        <input id="messageInput" placeholder="Type a message..."
               onkeypress="if(event.key==='Enter') sendMessage()"/>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    var stompClient = null;
    var username = null;

    function joinChat() {
        username = document.getElementById('nameInput').value.trim();
        if (!username) return;

        document.getElementById('join-page').style.display = 'none';
        document.getElementById('chat-page').style.display = 'flex';

        var socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {

            // Load chat history
            fetch('/messages')
                .then(r => r.json())
                .then(messages => {
                    messages.forEach(m => addHistory(m));
                    var li = document.createElement('li');
                    li.className = 'divider';
                    li.textContent = '── live ──';
                    document.getElementById('messages').appendChild(li);
                });

            // Subscribe to live messages
            stompClient.subscribe('/topic/messages', function (msg) {
                showMessage(JSON.parse(msg.body));
            });

            // Announce join
            stompClient.send('/app/addUser', {}, JSON.stringify({
                sender: username,
                type: 'JOIN'
            }));
        });
    }

    function addHistory(message) {
        var li = document.createElement('li');
        li.className = message.sender === username ? 'my-msg' : 'chat-msg';
        li.textContent = message.sender + ': ' + message.msg;
        document.getElementById('messages').appendChild(li);
    }

    function showMessage(message) {
        var li = document.createElement('li');
        if (message.type === 'JOIN') {
            li.className = 'join-msg';
            li.textContent = message.sender + ' joined 👋';
        } else if (message.type === 'LEAVE') {
            li.className = 'leave-msg';
            li.textContent = message.sender + ' left 👋';
        } else {
            li.className = message.sender === username ? 'my-msg' : 'chat-msg';
            li.textContent = message.sender + ': ' + message.msg;
        }
        var msgs = document.getElementById('messages');
        msgs.appendChild(li);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function sendMessage() {
        var content = document.getElementById('messageInput').value.trim();
        if (!content) return;
        stompClient.send('/app/sendMessage', {}, JSON.stringify({
            sender: username,
            msg: content,
            type: 'CHAT'
        }));
        document.getElementById('messageInput').value = '';
    }
</script>
</body>
</html>
